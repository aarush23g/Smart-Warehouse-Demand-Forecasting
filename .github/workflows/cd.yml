name: CD Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd Smart-Warehouse-Demand-Forecasting || git clone https://github.com/${{ github.repository }}.git
          cd Smart-Warehouse-Demand-Forecasting
          git pull origin main

          pip3 install --upgrade pip
          pip3 install --no-cache-dir pandas numpy streamlit scikit-learn joblib pyarrow fastapi uvicorn pydantic

          pkill -f streamlit || true

          nohup python3 -m streamlit run app/streamlit_app.py --server.port 8501 --server.address 0.0.0.0 > nohup.out 2>&1 &