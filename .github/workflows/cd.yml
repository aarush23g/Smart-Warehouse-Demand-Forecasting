name: CD Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # Install required packages
            sudo apt update
            sudo apt install -y python3-pip python3-venv git

            # Clone repo if it doesn't exist
            if [ ! -d "Smart-Warehouse-Demand-Forecasting" ]; then
              git clone https://github.com/${{ github.repository }}.git
            fi

            cd Smart-Warehouse-Demand-Forecasting

            # Pull latest code
            git pull origin main

            # Create virtual environment if not exists
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi

            # Activate virtual environment
            source venv/bin/activate

            # Upgrade pip
            pip install --upgrade pip

            # Install dependencies
            pip install pandas numpy streamlit scikit-learn joblib pyarrow fastapi uvicorn pydantic

            # Stop previous Streamlit instance
            pkill -f streamlit || true

            # Run Streamlit app
            nohup venv/bin/python -m streamlit run app/streamlit_app.py --server.port 8501 --server.address 0.0.0.0 > nohup.out 2>&1 &
