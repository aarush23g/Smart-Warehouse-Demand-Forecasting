name: CD Deployment
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script_stop: true
          command_timeout: 20m
          timeout: 60s
          script: |
            set -e
            echo "Starting deployment..."

            cd Smart-Warehouse-Demand-Forecasting

            # Pull latest code
            git pull origin main

            # Activate venv and update dependencies
            source venv/bin/activate
            pip install --quiet pandas numpy streamlit scikit-learn joblib pyarrow fastapi uvicorn pydantic

            # Restart via systemd (fast, clean, detached)
            sudo systemctl restart streamlit

            # Wait and verify
            sleep 5
            sudo systemctl is-active --quiet streamlit && echo "Streamlit is running!" || (sudo journalctl -u streamlit --no-pager -n 20 && exit 1)

            echo "Deployment finished"